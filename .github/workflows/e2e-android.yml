name: E2E — Android (Appium + docker-android)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-android:
    runs-on: ubuntu-latest      # KVM is available on GitHub-hosted ubuntu runners

    steps:
      - uses: actions/checkout@v4

      # Enable KVM for hardware-accelerated Android emulation
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Android emulator (docker-android)
        run: |
          docker run -d \
            --name android-emulator \
            --privileged \
            --device /dev/kvm \
            -p 5554:5554 \
            -p 5555:5555 \
            -e API_LEVEL=${{ env.ANDROID_API_LEVEL }} \
            -e IMG_TYPE=google_apis \
            -e ARCHITECTURE=x86_64 \
            -e DEVICE_ID=pixel \
            -e MEMORY=4096 \
            -e CORES=2 \
            -e DISABLE_ANIMATION=1 \
            -e SKIP_AUTH=1 \
            halimqarroum/docker-android:api-${{ env.ANDROID_API_LEVEL }}
        env:
          ANDROID_API_LEVEL: "34"

      - name: Start Appium server
        run: |
          npm install -g appium@latest
          appium --relaxed-security &
          sleep 5

      - name: Wait for emulator to be ready
        run: |
          echo "Waiting for ADB device to appear..."
          adb connect localhost:5555
          for i in $(seq 1 40); do
            if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "Emulator ready after $((i * 15))s"
              break
            fi
            echo "  Attempt $i/40 — waiting 15s..."
            sleep 15
          done
          adb devices

      - name: Start proxy + Appium plugin
        run: |
          npx ts-node -r dotenv/config src/kernel/chaos-proxy.ts &
          npx ts-node -r dotenv/config src/plugins/appium/server.ts &
          npx ts-node -r dotenv/config src/plugins/api/server.ts &
          sleep 3
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
          ANDROID_APP_PATH: ${{ env.ANDROID_APP_PATH }}
          LOG_LEVEL: info

      - name: Run E2E tests
        run: pnpm test
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          PLATFORM: android
          DRIVER: appium
          APPIUM_HOST: localhost
          APPIUM_PORT: "4723"
          ANDROID_APP_PATH: assets/apps/android/app-release.apk
          LOG_LEVEL: info

      - name: Stop emulator
        if: always()
        run: docker stop android-emulator && docker rm android-emulator
