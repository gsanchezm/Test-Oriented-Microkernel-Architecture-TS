name: Update visual baselines

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are baselines being refreshed? (Required — recorded in commit message and PR body.)'
        required: true
      target_branch:
        description: 'Branch to update baselines on (defaults to the branch this workflow runs on).'
        required: false

# Only one refresh in flight at a time per target branch — concurrent
# regenerations would race on the same files.
concurrency:
  group: update-visual-baselines-${{ github.event.inputs.target_branch || github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # capture — one leg per viewport. The visual bucket key comes from the
  # plugin's VIEWPORT (see visual-target-options.ts:
  # `variables.viewport ?? process.env.VIEWPORT ?? 'desktop'`), so a single
  # all-viewports pass would funnel every snapshot into one viewport bucket and
  # leave the other empty. Each matrix leg therefore starts the stack AT its
  # viewport and runs scripts/visual-regen.js <viewport>, which wipes only that
  # viewport's subtree and captures `@<viewport> and @visual` with
  # VISUAL_UPDATE_BASELINE=true. Fresh containers avoid the proxy-restart /
  # pnpm-child-survives-kill footgun a single-job two-pass design would hit.
  # ---------------------------------------------------------------------------
  capture:
    name: Capture baselines (${{ matrix.viewport }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        viewport: [desktop, responsive]

    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
      options: --user 0

    env:
      ARCHITECTURE_TYPE: TOM
      TOOL_NAME: pixelmatch
      PLATFORM: web
      # The render axis — must match the plugin VIEWPORT the TOM pixelmatch
      # jobs compare under, or the baseline buckets won't line up.
      VIEWPORT: ${{ matrix.viewport }}
      DRIVER: playwright
      HEADLESS: 'true'
      PLUGIN_PLAYWRIGHT: 'true'
      PLUGIN_PIXELMATCH: 'true'
      PLUGIN_API: 'true'
      VISUAL_UPDATE_BASELINE: 'true'
      # Capture against the SAME URLs the TOM pixelmatch jobs compare against
      # (secrets.BASE_URL / secrets.API_BASE_URL), so baseline source ==
      # comparison source and no URL drift can invalidate the visual oracle.
      # API_BASE_URL is required: the @visual Background logs in via the
      # LoginDao, whose constructor throws "Missing required env var: API_BASE_URL".
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      TOM_RUN_ID: tom-refresh-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.viewport }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start TOM stack
        shell: bash
        run: |
          mkdir -p logs
          pnpm run proxy   > logs/proxy.log   2>&1 &
          pnpm run plugins > logs/plugins.log 2>&1 &
          for _ in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/50051) >/dev/null 2>&1; then exit 0; fi
            sleep 1
          done
          echo "::error::TOM proxy never bound on :50051"
          tail -n 200 logs/proxy.log logs/plugins.log
          exit 1

      - name: Regenerate ${{ matrix.viewport }} baselines
        shell: bash
        # visual-regen.js wipes only THIS viewport's subtree, then runs
        # `@<viewport> and @visual` with VISUAL_UPDATE_BASELINE=true (green by
        # construction). Plugin already started at the matching VIEWPORT above.
        # `reports/` is gitignored (absent in a fresh checkout) and cucumber's
        # json formatter won't mkdir it — create it so the format write doesn't
        # ENOENT.
        run: |
          mkdir -p reports
          node scripts/visual-regen.js ${{ matrix.viewport }}

      - name: Upload ${{ matrix.viewport }} baselines
        uses: actions/upload-artifact@v4
        with:
          name: baselines-${{ matrix.viewport }}
          path: visual-baselines/
          # Fail loudly if the capture produced no PNGs — a silent empty
          # artifact would later open a no-op PR and look like success.
          if-no-files-found: error
          retention-days: 7

      - name: Upload ${{ matrix.viewport }} logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capture-logs-${{ matrix.viewport }}
          path: |
            logs/
            reports/playwright-visual-${{ matrix.viewport }}.json
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------------------
  # open-pr — merge every viewport's captured baselines into one working tree
  # and open a single refresh PR. Runs only if BOTH capture legs succeeded
  # (default `needs` semantics), so a half-captured set never lands a PR.
  # ---------------------------------------------------------------------------
  open-pr:
    name: Open baselines refresh PR
    needs: capture
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_branch || github.ref_name }}
          fetch-depth: 0

      - name: Download all viewport baselines
        uses: actions/download-artifact@v4
        with:
          pattern: baselines-*
          merge-multiple: true
          path: visual-baselines/

      - name: Force-stage baselines (override the local-only PNG ignore rule)
        # The repo's .gitignore excludes `visual-baselines/*` (only the
        # .gitkeep is tracked by default) so dev laptops don't accidentally
        # commit Windows/macOS-rendered PNGs that would diff against the
        # CI Linux container. These artifacts ARE the canonical Linux
        # baselines — so we override the ignore via `git add -f` and let
        # peter-evans commit the resulting index.
        run: git add -f visual-baselines/

      - name: Open refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          # `add-paths` omitted on purpose: peter-evans then commits the
          # entire pre-staged index, including the force-staged PNGs.
          # Setting `add-paths: visual-baselines/` re-runs `git add` without
          # `-f` and silently drops the ignored files.
          branch: visual-baselines/refresh-${{ github.run_id }}
          base: ${{ github.event.inputs.target_branch || github.ref_name }}
          commit-message: |
            chore(visual): refresh baselines

            Reason: ${{ github.event.inputs.reason }}
            Triggered by: @${{ github.actor }}
            Workflow run: ${{ github.run_id }}
          title: 'chore(visual): refresh baselines (run ${{ github.run_id }})'
          body: |
            Automated refresh of `visual-baselines/` (desktop + responsive).

            **Reason:** ${{ github.event.inputs.reason }}
            **Triggered by:** @${{ github.actor }}
            **Source run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Review the PNG diffs in this PR before merging — every checked-in
            baseline becomes the new source of truth for the TOM pixelmatch
            jobs (`pixelmatch-desktop` / `pixelmatch-responsive`), whose Visual
            gate compares actual captures against these PNGs.
